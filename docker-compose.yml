version: '3.6'
services:
    aws-web-trungbo:
        image: ngovanmanh/aws-web-trungbo:1.0.0
        ports:
        - 2028:80              
        deploy:
            restart_policy:
                condition: on-failure
            replicas: 1           
        
        networks:
            - aws_system_network
        
networks: 
  aws_system_network:
    external: true